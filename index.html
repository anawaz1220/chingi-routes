<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chingi Tours – Interactive Route Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css?v=20260429">
</head>
<body>

  <div id="app">

    <!-- ── Sidebar ── -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <img src="assets/logo.png" alt="Chingi Tours" id="logo" onerror="this.style.display='none'">
      </div>

      <div id="sidebar-content">
        <div id="show-all-btn" class="show-all-row">
          <button id="btn-show-all" class="btn-show-all active">Show All Tours</button>
        </div>
        <nav id="tour-list">
          <!-- Populated by script.js -->
        </nav>
      </div>

      <div id="sidebar-footer">
        <div id="dev-credit">
          <span class="dev-name">Developed by: <strong>Asif Nawaz</strong></span>

          <button class="dev-icon-btn" id="copy-email-btn" title="Copy email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
          </button>

          <a class="dev-icon-btn" href="https://www.fiverr.com/jam_asif?public_mode=true" target="_blank" rel="noopener" title="Fiverr profile">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M23.004 15.588a.995.995 0 1 0 .002-1.99.995.995 0 0 0-.002 1.99zm-.996-3.705h-1.34c-.24 0-.44.166-.49.396l-.916 4.347H18.1l-.944-4.347a.498.498 0 0 0-.49-.396h-2.71v-.46c0-.37.302-.67.673-.67h.898a.498.498 0 0 0 .498-.497V9.56a.498.498 0 0 0-.498-.497h-.898c-1.57 0-2.852 1.274-2.852 2.842v.547h-.668a.498.498 0 0 0-.498.497v.893c0 .275.223.497.498.497h.668v4.35c0 .275.223.498.498.498h1.34c.275 0 .498-.223.498-.497v-4.35h1.295l.942 4.323c.09.413.459.7.882.7h1.434c.424 0 .793-.287.882-.7l1.066-5.055v5.258c0 .275.223.497.498.497h1.34c.275 0 .497-.222.497-.497V12.38a.498.498 0 0 0-.497-.497zM9.93 7.18H8.59a.498.498 0 0 0-.498.498v.893c0 .275.223.497.498.497h1.34c.275 0 .498-.222.498-.497V7.678a.498.498 0 0 0-.498-.498zm0 2.878H8.59a.498.498 0 0 0-.498.498v6.698c0 .275.223.497.498.497h1.34c.275 0 .498-.222.498-.497V10.556a.498.498 0 0 0-.498-.498z"/>
            </svg>
          </a>

          <a class="dev-icon-btn" href="https://www.linkedin.com/in/asif-nawaz-gis-developer" target="_blank" rel="noopener" title="LinkedIn profile">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>

          <div id="email-toast">Email copied!</div>
        </div>
      </div>
    </aside>

    <!-- ── Map ── -->
    <main id="map-container">
      <!-- Mobile sidebar toggle -->
      <button id="mobile-toggle" title="Toggle tour list" aria-label="Toggle sidebar">
        <span class="hamburger">☰</span>
      </button>

      <div id="map"></div>

      <!-- Basemap Switcher -->
      <div id="layer-switcher">
        <button class="layer-toggle-btn" id="layer-toggle" title="Change basemap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
        </button>
        <div class="layer-options" id="layer-options">
          <button class="layer-opt active" data-layer="light">Light</button>
          <button class="layer-opt" data-layer="dark">Dark</button>
          <button class="layer-opt" data-layer="satellite">Satellite</button>
        </div>
      </div>
    </main>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Polyline decorator (directional arrows) -->
  <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

  <!-- Tour Data -->
  <script src="data/tours.js?v=20260429"></script>
  <script src="data/routes.js?v=20260429"></script>

  <!-- App Logic -->
  <script src="script.js?v=20260429"></script>

</body>
</html>
